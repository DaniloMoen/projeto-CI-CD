name: CI/CD Pipeline - Deploy com Docker na EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to AWS EC2 via Docker
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout do código
        uses: actions/checkout@v3

      - name: 2. Enviar todos os arquivos para a EC2 (SCP)
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "./*"
          target: "/home/ubuntu/projeto"

      - name: 3. Construir e Executar Contentor Docker via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.GECO_HOST || secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
           
            sudo systemctl stop apache2 || true
            sudo systemctl disable apache2 || true
            
           
            if ! command -v docker &> /dev/null; then
              echo "Docker não encontrado. A iniciar a instalação..."
              sudo apt-get update
              sudo apt-get install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ubuntu
            fi
            
          
            cd /home/ubuntu/projeto
            
           
            sudo docker stop cafe-container || true
            sudo docker rm cafe-container || true
            
           
            sudo docker build -t onepage-cafe .
            
            sudo docker run -d -p 80:80 --name cafe-container --restart always onepage-cafe
